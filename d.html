<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A dog on The Dog Show</title>
  <meta name="description" content="One dog, one stage, one permanent page on dogshow.lol. See their certificate, give bones, and watch the show live.">

  <!-- Open Graph + Twitter — social crawlers don't execute JS, so these
       static tags are what /d/{slug} shares preview as. Per-dog tags would
       require server-side rendering (planned for v2). -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="A dog on The Dog Show — see their certificate">
  <meta property="og:description" content="One dog, one stage, one permanent page on dogshow.lol. Give them bones and watch the show live.">
  <meta property="og:site_name" content="The Dog Show">
  <meta property="og:image" content="https://dogshow.lol/og-image.png">
  <meta property="og:image:secure_url" content="https://dogshow.lol/og-image.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="The Dog Show — A Live Dog-Viewing Experience">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="A dog on The Dog Show — see their certificate">
  <meta name="twitter:description" content="One dog, one stage, one permanent page on dogshow.lol.">
  <meta name="twitter:image" content="https://dogshow.lol/og-image.png">
  <meta name="twitter:image:alt" content="The Dog Show — A Live Dog-Viewing Experience">

  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <script>
    // Route /d/slug-name → dog.html?slug=slug-name. Crawlers ignore this and
    // index the OG tags above (which is what we want — they're the social card).
    var path = window.location.pathname;
    var match = path.match(/^\/d\/([a-z0-9-]+)$/);
    if (match && match[1]) {
      window.location.replace('/dog.html?slug=' + encodeURIComponent(match[1]));
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
