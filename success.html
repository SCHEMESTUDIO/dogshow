  <style>
    @font-face {
      font-family: 'Yang Bagus';

    .success-body {
      background: #0f0a22;

    .success-icon { font-size: 64px; margin-bottom: 16px; }

    .success-title {
      font-family: 'Yang Bagus', 'YangBagus', cursive;
      font-size: clamp(28px, 6vw, 48px);
      color: #FF8C42;
      margin-bottom: 8px;

    }

    .success-subtitle {
      font-size: 16px;

    .success-dog-preview {
      background: #1a1035;

      border-radius: 16px;

    .success-dog-img {
      width: 100px;

    .success-share-label {
      font-size: 12px;

      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .success-share-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .success-share-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid;
      background: transparent;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;

    .success-share-btn.share-facebook {
      color: #4267B2;

    .success-share-btn.share-facebook:hover {

    .success-share-btn.share-twitter {

    }
    .success-share-btn.share-twitter:hover {

    }

    .success-share-btn.share-whatsapp {
      color: #25D366;

    .success-share-btn.share-whatsapp:hover {

    .success-share-btn.share-copy {

    .success-share-btn:hover {

    .success-share-copied {

    }

    .success-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
      width: 100%;
    }

    .success-btn-primary {
      padding: 14px 28px;
      border-radius: 10px;
      border: none;
      background: #FF8C42;
      color: #1a1035;

<body class="success-body">

  <div class="success-icon" id="successIcon">&#127881;</div>
  <div class="success-title" id="successTitle">You're officially in The Dog Show.</div>
  <div class="success-subtitle" id="successSubtitle">The campaign for bones begins now.</div>

  <!-- Dog preview (shown if dog data is pending) -->
  <div class="success-dog-preview" id="dogPreview" hidden>
    <img class="success-dog-img" id="successDogImg" src="" alt="Your dog">
    <div class="success-dog-name" id="successDogName"></div>
    <div class="success-dog-status">&#10003; Entered into The Dog Show</div>

    <div class="success-share-label">Share the news</div>
    <div class="success-share-buttons">
      <a class="success-share-btn share-facebook" id="shareFacebook" href="#" target="_blank">Facebook</a>
      <a class="success-share-btn share-twitter" id="shareTwitter" href="#" target="_blank">X / Twitter</a>
      <a class="success-share-btn share-whatsapp" id="shareWhatsApp" href="#" target="_blank">WhatsApp</a>
      <button class="success-share-btn share-copy" id="shareCopy">Copy Link</button>
    </div>
    <div class="success-share-copied" id="shareCopied"></div>
  </div>

  <div class="success-actions">
    <button class="success-btn-primary" id="enterShowBtn">Enter The Dog Show</button>
    <a class="success-btn-secondary" href="/" id="enterAnotherBtn" hidden>Enter Another Dog</a>
  </div>

  <div class="success-trust">Payment confirmed. Lifetime access activated.</div>

  <!-- Curtain Reveal Overlay -->
  <div class="curtain-overlay" id="curtainOverlay" hidden>
    <div class="curtain-rod"></div>
    <div class="curtain-left" id="curtainLeft"></div>
    <div class="curtain-right" id="curtainRight"></div>
    <div class="curtain-text" id="curtainText">
      <div class="curtain-welcome">Welcome to</div>
      <div class="curtain-show-name">THE DOG SHOW</div>
      <div class="curtain-enjoy">Enjoy.</div>
    </div>
  </div>

  <script>
    const PARTY_HOST = 'dogshow.schemestudio.partykit.dev';
    const PARTY_ROOM = 'dogshow-live';
    const API_BASE = `https://${PARTY_HOST}/party/${PARTY_ROOM}`;

    const params = new URLSearchParams(window.location.search);
    const tier = params.get('tier') || 'general';
    const sessionId = params.get('session_id') || '';
    const email = params.get('email') || '';

    // Fire Bing UET + GA4 purchase event. Only paid tiers reach this page
    // (free tier skips Stripe and goes straight to show.html from index.html).
    // Revenue values must match Stripe prices.
    // analytics.js is loaded with `defer`, so it executes AFTER inline scripts
    // during parsing. We must wait for DOMContentLoaded before calling helpers
    // — otherwise window.trackPurchase is undefined and the event silently no-ops.
    const revenueByTier = { general: 1.99, premium: 3.99 };
    function fireBingPurchaseConversion() {
      if (window.trackPurchase && revenueByTier[tier] != null) {
        window.trackPurchase(tier, revenueByTier[tier]);
      }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', fireBingPurchaseConversion);
    } else {
      fireBingPurchaseConversion();
    }

    // Check for pending dog upload
    const pendingDogName = localStorage.getItem('dogshow_pending_dog_name');
    const pendingDogImage = localStorage.getItem('dogshow_pending_dog_image');

    if (pendingDogName) {
      document.getElementById('successTitle').textContent = pendingDogName + ' is officially in The Dog Show.';
      document.getElementById('successSubtitle').textContent = "Their campaign for bones begins now.";
      document.getElementById('successIcon').textContent = '🐕';

      const dogPreview = document.getElementById('dogPreview');
      dogPreview.hidden = false;
      document.getElementById('successDogName').textContent = pendingDogName;

      if (pendingDogImage) {
        document.getElementById('successDogImg').src = pendingDogImage;
      }

      document.getElementById('enterAnotherBtn').hidden = false;

      // Share URLs
      const shareText = 'My dog ' + pendingDogName + ' is officially in The Dog Show. Please give them bones.';
      const shareUrl = 'https://dogshow.lol';

      document.getElementById('shareFacebook').href =
        'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(shareUrl) + '&quote=' + encodeURIComponent(shareText);
      document.getElementById('shareTwitter').href =
        'https://twitter.com/intent/tweet?text=' + encodeURIComponent(shareText) + '&url=' + encodeURIComponent(shareUrl);
      document.getElementById('shareWhatsApp').href =
        'https://wa.me/?text=' + encodeURIComponent(shareText + ' ' + shareUrl);

      document.getElementById('shareCopy').addEventListener('click', function() {
        navigator.clipboard.writeText(shareText + ' ' + shareUrl).then(function() {
          document.getElementById('shareCopied').textContent = 'Copied!';
          setTimeout(function() { document.getElementById('shareCopied').textContent = ''; }, 2000);
        });
      });
    }

    // Verify the Stripe payment server-side, then provision the account.
    // The server reads tier + email back from Stripe — the URL params are no
    // longer trusted to grant a tier (see platform audit Critical-1/Critical-2).
    async function registerUser() {
      if (!sessionId) {
        console.error('No session_id on success page — cannot verify payment.');
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/verify-checkout`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ session_id: sessionId }),
        });
        const data = await res.json();
        if (data.ok && data.token) {
          localStorage.setItem('dogshow_token', data.token);
          localStorage.setItem('dogshow_tier', data.user.tier);
          if (data.user.username) {
            localStorage.setItem('dogshow_username', data.user.username);
          }
          if (data.user.fan_id) {
            localStorage.setItem('dogshow_fan_id', data.user.fan_id);
          }
        } else {
          console.error('Checkout verification failed:', data.error || res.status);
        }
      } catch (e) {
        console.error('Checkout verification failed:', e);
      }
    }

    registerUser();

    // Enter show button
    const curtainOverlay = document.getElementById('curtainOverlay');
    const curtainLeft = document.getElementById('curtainLeft');
    const curtainRight = document.getElementById('curtainRight');
    const curtainText = document.getElementById('curtainText');

    function playBark() {
      try {
        var ctx = new (window.AudioContext || window.webkitAudioContext)();
        var o1 = ctx.createOscillator();
        var g1 = ctx.createGain();
        o1.type = 'sawtooth';
        o1.frequency.setValueAtTime(600, ctx.currentTime);
        o1.frequency.exponentialRampToValueAtTime(250, ctx.currentTime + 0.12);
        g1.gain.setValueAtTime(0.18, ctx.currentTime);
        g1.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
        o1.connect(g1);
        g1.connect(ctx.destination);
        o1.start(ctx.currentTime);
        o1.stop(ctx.currentTime + 0.15);
        var o2 = ctx.createOscillator();
        var g2 = ctx.createGain();
        o2.type = 'sawtooth';
        o2.frequency.setValueAtTime(400, ctx.currentTime + 0.18);
        o2.frequency.exponentialRampToValueAtTime(150, ctx.currentTime + 0.35);
        g2.gain.setValueAtTime(0.001, ctx.currentTime);
        g2.gain.setValueAtTime(0.15, ctx.currentTime + 0.18);
        g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        o2.connect(g2);
        g2.connect(ctx.destination);
        o2.start(ctx.currentTime + 0.18);
        o2.stop(ctx.currentTime + 0.4);
        setTimeout(function() { ctx.close(); }, 1000);
      } catch (e) {}
    }

    document.getElementById('enterShowBtn').addEventListener('click', function() {
      curtainOverlay.hidden = false;
      curtainOverlay.classList.add('active');
      document.body.style.overflow = 'hidden';

      setTimeout(function() {
        curtainLeft.classList.add('open');
        curtainRight.classList.add('open');
        playBark();
      }, 500);

      setTimeout(function() {
        curtainText.classList.add('visible');
      }, 2000);

      setTimeout(function() {
        // Use the server-verified tier (set by registerUser) rather than the
        // URL param, which is no longer trusted.
        var finalTier = localStorage.getItem('dogshow_tier') || tier;
        window.location.href = 'show.html?tier=' + finalTier;
      }, 3500);
    });
  </script>
</body>
