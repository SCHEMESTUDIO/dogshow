<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-V830P7PPHQ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-V830P7PPHQ');
  </script>
  <!-- Faurya Analytics -->
  <script async defer src="https://www.faurya.com/js/script.js" data-website-id="cmosekmvz000xl204a7bhm4cm" data-domain="dogshow.lol"></script>
  <title>Dog Show — Payment Successful</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
  <div class="landing">
    <div class="landing-presenting">payment confirmed</div>
    <h1 class="landing-title">You're In</h1>
    <p class="landing-tagline">Redirecting you to The Dog Show...</p>
  </div>

  <div class="curtain-overlay active" id="curtainOverlay">
    <div class="curtain-rod"></div>
    <div class="curtain-left" id="curtainLeft"></div>
    <div class="curtain-right" id="curtainRight"></div>
    <div class="curtain-text" id="curtainText">
      <div class="curtain-welcome">Welcome to</div>
      <div class="curtain-show-name">DOG SHOW</div>
      <div class="curtain-enjoy">Enjoy.</div>
    </div>
  </div>

  <script>
    const PARTY_HOST = 'dogshow.schemestudio.partykit.dev';
    const PARTY_ROOM = 'dogshow-live';
    const API_BASE = `https://${PARTY_HOST}/party/${PARTY_ROOM}`;

    // Extract tier and Stripe session from URL params
    const params = new URLSearchParams(window.location.search);
    const tier = params.get('tier') || 'general';
    const sessionId = params.get('session_id') || '';

    // Register user with PartyKit
    async function registerUser() {
      // Stripe Checkout prefills customer_email — we retrieve it from the session
      // For now, prompt if we can't get it from Stripe (client-side can't read session details)
      // The email is collected by Stripe; we pass it via a query param from Checkout
      const email = params.get('email') || '';

      if (!email) {
        // If no email in URL, skip registration (will need to handle differently)
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            tier: tier,
            stripeCustomerId: sessionId,
          }),
        });
        const data = await res.json();
        if (data.ok && data.token) {
          localStorage.setItem('dogshow_token', data.token);
          localStorage.setItem('dogshow_tier', data.user.tier);
          if (data.user.username) {
            localStorage.setItem('dogshow_username', data.user.username);
          }
        }
      } catch (e) {
        console.error('Registration failed:', e);
      }
    }

    registerUser();

    // Play curtain animation then redirect
    const curtainLeft = document.getElementById('curtainLeft');
    const curtainRight = document.getElementById('curtainRight');
    const curtainText = document.getElementById('curtainText');

    setTimeout(() => {
      curtainLeft.classList.add('open');
      curtainRight.classList.add('open');
    }, 500);

    setTimeout(() => {
      curtainText.classList.add('visible');
    }, 2000);

    setTimeout(() => {
      window.location.href = 'show.html?tier=' + tier;
    }, 3500);
  </script>
</body>
</html>
