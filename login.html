<html lang="en">
<head>
  <meta charset="UTF-8">

  <script src="analytics.js" defer></script>

  <link rel="canonical" href="https://dogshow.lol/login.html">
  <meta name="description" content="Log in to The Dog Show.">

  <!-- Open Graph + Twitter — minimal set so any accidental share has a clean preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="The Dog Show — Log in">
  <meta property="og:description" content="The internet's live dog show. Watch dogs, give bones, enter your own dog free.">
  <meta property="og:url" content="https://dogshow.lol/">
  <meta property="og:site_name" content="The Dog Show">

  <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
  <div class="landing">
    <div class="landing-presenting">welcome back</div>
    <h1 class="landing-title">DOG SHOW</h1>
    <p class="landing-tagline-static" id="statusMessage" role="status" aria-live="polite">Verifying your login...</p>
    <a id="loginCta" href="/#loginSection" style="display:none;margin-top:18px;padding:12px 28px;background:#FF8C42;color:#1a1035;border-radius:10px;text-decoration:none;font-weight:700;font-size:15px;">Request a new link &rarr;</a>
  </div>

  <div class="curtain-overlay" id="curtainOverlay" hidden>
    <div class="curtain-rod"></div>
    <div class="curtain-left" id="curtainLeft"></div>
    <div class="curtain-right" id="curtainRight"></div>
    <div class="curtain-text" id="curtainText">
      <div class="curtain-welcome">Welcome back to</div>
      <div class="curtain-show-name">THE DOG SHOW</div>
      <div class="curtain-enjoy">Enjoy.</div>
    </div>
  </div>

  <script>
    const PARTY_HOST = 'dogshow.schemestudio.partykit.dev';
    const PARTY_ROOM = 'dogshow-live';
    const API_BASE = `https://${PARTY_HOST}/party/${PARTY_ROOM}`;

    const params = new URLSearchParams(window.location.search);
    const magicToken = params.get('token');
    const statusMessage = document.getElementById('statusMessage');
    const loginCta = document.getElementById('loginCta');
    function showLoginCta() { if (loginCta) loginCta.style.display = 'inline-block'; }

    async function verifyLogin() {
      if (!magicToken) {
        statusMessage.textContent = 'Invalid login link. Please request a new one.';
        showLoginCta();
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: magicToken }),
        });
        const data = await res.json();

        if (data.ok && data.token) {
          // Save session
          localStorage.setItem('dogshow_token', data.token);
          localStorage.setItem('dogshow_tier', data.user.tier);
          if (data.user.username) {
            localStorage.setItem('dogshow_username', data.user.username);
          }

          statusMessage.textContent = 'You\'re in! Entering the show...';

          // Play curtain and go
          const curtainOverlay = document.getElementById('curtainOverlay');
          const curtainLeft = document.getElementById('curtainLeft');
          const curtainRight = document.getElementById('curtainRight');
          const curtainText = document.getElementById('curtainText');

          curtainOverlay.hidden = false;
          curtainOverlay.classList.add('active');

          setTimeout(() => {
            curtainLeft.classList.add('open');
            curtainRight.classList.add('open');
          }, 500);

          setTimeout(() => {
            curtainText.classList.add('visible');
          }, 2000);

          setTimeout(() => {
            window.location.href = 'show.html?tier=' + data.user.tier;
          }, 3500);
        } else {
          statusMessage.textContent = data.error || 'This link has expired. Please request a new one.';
          showLoginCta();
        }
      } catch (e) {
        statusMessage.textContent = 'Something went wrong. Please try again.';
        showLoginCta();
      }
    }

    verifyLogin();
  </script>
  <footer style="text-align:center;padding:24px 16px;border-top:1px solid rgba(42,33,80,0.11);background:#e9e2f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
    <div style="display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin-bottom:8px;">

      <a href="/dogs" style="font-size:12px;color:#5d5088;text-decoration:none;">All Dogs</a>

      <a href="#" data-cookie-settings style="font-size:12px;color:#5d5088;text-decoration:none;">Cookie settings</a>

      <a href="/breeds" style="font-size:12px;color:#5d5088;text-decoration:none;">Breeds</a>
    </div>
    <div style="font-size:11px;color:#d9cfee;">The Dog Show &copy; 2026. All dogs are good dogs.</div>
  </footer>
</body>
