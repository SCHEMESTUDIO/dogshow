<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Dog Show — Admin</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --bg: #f3eefb;
      --panel: #ffffff;
      --panel-2: #f8f5fd;
      --accent: #FF8C42;
      --text: #2a2150;
      --text-dim: rgba(42,33,80,0.8500000000000001);
      --border: rgba(42,33,80,0.14);
      --danger: #c62828;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 32px 20px;
    }
    .wrap { max-width: 880px; margin: 0 auto; }
    h1 { color: var(--accent-text, #c25a0e); font-size: 24px; margin-bottom: 4px; }
    .sub { color: var(--text-dim); font-size: 13px; margin-bottom: 28px; }

    .login { max-width: 380px; margin: 56px auto; text-align: center; }
    .login input {
      width: 100%; padding: 12px 14px; margin: 16px 0 8px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
    }
    .login input:focus { outline: none; border-color: var(--accent-text, #c25a0e); }
    .btn {
      background: var(--accent); color: #1a1035; border: none;
      padding: 11px 22px; border-radius: 10px; font-size: 14px;
      font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .btn-wide { width: 100%; }
    .err { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 8px; }

    .stats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .stat {
      flex: 1 1 110px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px;
    }
    .stat-num { font-size: 22px; font-weight: 700; color: var(--accent-text, #c25a0e); }
    .stat-label {
      font-size: 11px; color: var(--text-dim); text-transform: uppercase;
      letter-spacing: 1px; margin-top: 2px;
    }
    .stat.warn .stat-num { color: var(--danger); }

    .section-title {
      font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-dim); margin: 24px 0 10px;
    }
    .stuck {
      background: rgba(231, 76, 60, 0.1); border: 1px solid rgba(231, 76, 60, 0.35);
      border-radius: 10px; padding: 6px 8px; font-size: 13px;
    }
    .stuck-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 6px; border-bottom: 1px solid rgba(42,33,80,0.07);
    }
    .stuck-row:last-child { border-bottom: none; }
    .stuck-info { flex: 1 1 auto; min-width: 0; }
    .stuck-email { font-weight: 600; }
    .stuck-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .stuck-btn {
      background: rgba(255,140,66,0.15); border: 1px solid rgba(255,140,66,0.5);
      color: #a3540f; padding: 6px 12px; border-radius: 8px; font-size: 12px;
      font-weight: 600; cursor: pointer; font-family: inherit; flex-shrink: 0;
    }
    .stuck-btn:hover { background: rgba(255,140,66,0.3); }
    .stuck-btn:disabled { opacity: 0.5; cursor: default; }
    .resolved {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 6px 8px; font-size: 13px;
    }
    .resolved-row {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 6px; border-bottom: 1px solid rgba(42,33,80,0.07);
      opacity: 0.78;
    }
    .resolved-row:last-child { border-bottom: none; }
    .resolved-note {
      font-size: 11px; color: var(--text-dim); margin-top: 2px;
      font-style: italic;
    }
    .resolved-btn {
      background: var(--panel-2); border: 1px solid var(--border);
      color: var(--text-dim); padding: 6px 12px; border-radius: 8px; font-size: 11px;
      cursor: pointer; font-family: inherit; flex-shrink: 0;
    }
    .resolved-btn:hover { color: var(--text); border-color: var(--accent-text, #c25a0e); }
    details.resolved-wrap { margin-top: 8px; }
    details.resolved-wrap summary {
      font-size: 12px; color: var(--text-dim); cursor: pointer;
      padding: 6px 0; user-select: none;
    }
    details.resolved-wrap summary:hover { color: var(--text); }

    .dog {
      display: flex; align-items: center; gap: 12px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; margin-bottom: 8px;
    }
    .dog-thumb {
      width: 52px; height: 52px; border-radius: 8px; object-fit: cover;
      flex-shrink: 0; background: var(--panel-2);
    }
    .dog-info { flex: 1 1 auto; min-width: 0; }
    .dog-name { font-weight: 600; font-size: 15px; }
    .dog-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .dog-del {
      background: rgba(231, 76, 60, 0.15); border: 1px solid rgba(231, 76, 60, 0.5);
      color: #b3261e; padding: 7px 14px; border-radius: 8px; font-size: 12px;
      font-weight: 600; cursor: pointer; font-family: inherit; flex-shrink: 0;
    }
    .dog-del:hover { background: rgba(231, 76, 60, 0.3); }
    .dog-del:disabled { opacity: 0.5; cursor: default; }
    .seed-tag {
      font-size: 10px; color: var(--text-dim); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px; margin-left: 6px;
    }
    .muted { color: var(--text-dim); font-size: 13px; }
    .reload {
      background: var(--panel); border: 1px solid var(--border); color: var(--text);
      padding: 7px 14px; border-radius: 8px; font-size: 12px; cursor: pointer;
      font-family: inherit;
    }
    .row-between { display: flex; justify-content: space-between; align-items: center; }

    /* Testimonials */
    .test-card {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 10px;
    }
    .test-meta { font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
    .test-meta strong { color: var(--text); }
    .test-text {
      font-size: 14px; line-height: 1.5; margin-bottom: 10px;
      background: var(--panel-2); border-radius: 8px; padding: 10px 12px;
    }
    .test-text-edit {
      width: 100%; min-height: 64px; box-sizing: border-box;
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: inherit; font-size: 14px; line-height: 1.5;
      padding: 10px 12px; margin-bottom: 10px; resize: vertical;
    }
    .test-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .test-btn {
      border: 1px solid var(--border); background: var(--panel-2); color: var(--text);
      padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .test-btn:hover { border-color: var(--accent-text, #c25a0e); }
    .test-btn.approve { background: rgba(255,140,66,0.15); border-color: rgba(255,140,66,0.5); color: #a3540f; }
    .test-btn.reject { background: rgba(231,76,60,0.12); border-color: rgba(231,76,60,0.4); color: #b3261e; }
    .test-btn.delete { background: rgba(231,76,60,0.2); border-color: rgba(231,76,60,0.55); color: #b3261e; }
    .test-btn:disabled { opacity: 0.5; cursor: default; }
    .test-status-tag {
      display: inline-block; font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; padding: 2px 6px; border-radius: 4px; margin-left: 6px;
    }
    .test-status-tag.approved { background: rgba(255,140,66,0.18); color: #a3540f; }
    .test-status-tag.rejected { background: rgba(231,76,60,0.18); color: #b3261e; }

    .add-test-form {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 14px 16px; margin-bottom: 16px;
    }
    .add-test-form label {
      display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
      color: var(--text-dim); margin: 8px 0 4px;
    }
    .add-test-form select, .add-test-form textarea {
      width: 100%; box-sizing: border-box;
      background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: inherit; font-size: 13px; padding: 9px 11px;
    }
    .add-test-form textarea { min-height: 72px; resize: vertical; }
    .add-test-form .row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dog Show — Admin</h1>
    <div class="sub">dogshow.lol control panel</div>

    <div class="login" id="loginView">
      <div class="muted">Enter the admin key to continue.</div>
      <input type="password" id="keyInput" placeholder="Admin key" autocomplete="off" spellcheck="false">
      <button class="btn btn-wide" id="unlockBtn">Unlock</button>
      <div class="err" id="loginErr"></div>
    </div>

    <div id="dashView" hidden>
      <div class="stats" id="statsRow"></div>

      <div id="stuckWrap" hidden>
        <div class="section-title">Paid users with no dog — follow up</div>
        <div class="stuck" id="stuckList"></div>
        <details class="resolved-wrap" id="resolvedWrap" hidden>
          <summary>Resolved follow-ups (<span id="resolvedCount">0</span>) — click to expand</summary>
          <div class="resolved" id="resolvedList" style="margin-top:8px;"></div>
        </details>
      </div>

      <div class="row-between" style="margin: 24px 0 10px;">
        <div class="section-title" style="margin: 0;">Testimonials — pending (<span id="pendingCount">0</span>)</div>
        <button class="reload" id="reloadTestBtn">Reload</button>
      </div>
      <div id="pendingTestList"></div>

      <div class="section-title" style="margin: 20px 0 10px;">Add testimonial manually</div>
      <div class="add-test-form">
        <label for="addTestDog">Dog</label>
        <select id="addTestDog"><option value="">— pick a dog —</option></select>
        <label for="addTestText">Testimonial text</label>
        <textarea id="addTestText" maxlength="500" placeholder="Paste exactly what they wrote. Up to ~280 chars on the landing card; the rest gets truncated."></textarea>
        <div class="row">
          <button class="btn" id="addTestBtn">Add (approved)</button>
          <span class="muted" id="addTestStatus"></span>
        </div>
      </div>

      <div class="section-title" style="margin: 20px 0 10px;">Testimonials — approved (<span id="approvedCount">0</span>) <span class="muted" style="margin-left:4px;font-size:11px;">— live on landing</span></div>
      <div id="approvedTestList"></div>

      <div class="row-between" style="margin: 24px 0 10px;">
        <div class="section-title" style="margin: 0;">Community dogs (<span id="dogCount">0</span>)</div>
        <button class="reload" id="reloadBtn">Reload</button>
      </div>
      <div id="dogList"></div>
    </div>
  </div>

  <script>
    var PARTY = 'https://dogshow.schemestudio.partykit.dev/party/dogshow-live';
    var adminKey = '';

    var keyInput = document.getElementById('keyInput');
    var unlockBtn = document.getElementById('unlockBtn');
    var loginErr = document.getElementById('loginErr');
    var loginView = document.getElementById('loginView');
    var dashView = document.getElementById('dashView');
    var statsRow = document.getElementById('statsRow');
    var stuckWrap = document.getElementById('stuckWrap');
    var stuckList = document.getElementById('stuckList');
    var resolvedWrap = document.getElementById('resolvedWrap');
    var resolvedList = document.getElementById('resolvedList');
    var resolvedCountEl = document.getElementById('resolvedCount');
    var dogList = document.getElementById('dogList');
    var dogCount = document.getElementById('dogCount');
    var reloadBtn = document.getElementById('reloadBtn');
    var pendingTestList = document.getElementById('pendingTestList');
    var approvedTestList = document.getElementById('approvedTestList');
    var pendingCount = document.getElementById('pendingCount');
    var approvedCount = document.getElementById('approvedCount');
    var addTestDog = document.getElementById('addTestDog');
    var addTestText = document.getElementById('addTestText');
    var addTestBtn = document.getElementById('addTestBtn');
    var addTestStatus = document.getElementById('addTestStatus');
    var reloadTestBtn = document.getElementById('reloadTestBtn');
    var allDogsCache = [];

    function stat(num, label, warn) {
      var d = document.createElement('div');
      d.className = 'stat' + (warn ? ' warn' : '');
      var n = document.createElement('div');
      n.className = 'stat-num';
      n.textContent = num;
      var l = document.createElement('div');
      l.className = 'stat-label';
      l.textContent = label;
      d.appendChild(n);
      d.appendChild(l);
      return d;
    }

    function renderAudit(audit) {
      var s = (audit && audit.summary) || {};
      var tc = s.tierCounts || {};
      statsRow.innerHTML = '';
      statsRow.appendChild(stat(s.totalUsers != null ? s.totalUsers : '—', 'Users'));
      statsRow.appendChild(stat(tc.premium || 0, 'Premium'));
      statsRow.appendChild(stat(tc.general || 0, 'General'));
      statsRow.appendChild(stat(tc.free || 0, 'Free'));
      statsRow.appendChild(stat(s.communityDogsCount != null ? s.communityDogsCount : '—', 'Dogs'));
      statsRow.appendChild(stat(s.stuckPremiumCount || 0, 'Stuck paid', (s.stuckPremiumCount || 0) > 0));
      var orphans = (s.orphanedImgCount || 0) + (s.orphanedSlugCount || 0);
      statsRow.appendChild(stat(orphans, 'Orphan keys', orphans > 0));

      var stuck = (audit && audit.stuckPremium) || [];
      var resolved = (audit && audit.resolvedPremium) || [];

      // Show the section if there's anything in either list — the history
      // remains useful even when the active worklist is empty.
      if (stuck.length || resolved.length) {
        stuckWrap.hidden = false;
      } else {
        stuckWrap.hidden = true;
        return;
      }

      stuckList.innerHTML = '';
      if (stuck.length) {
        stuck.forEach(function (u) { stuckList.appendChild(renderStuckRow(u)); });
      } else {
        var clear = document.createElement('div');
        clear.className = 'stuck-row';
        clear.style.opacity = '0.7';
        clear.textContent = 'All caught up — no unresolved paid users.';
        stuckList.appendChild(clear);
      }

      resolvedCountEl.textContent = resolved.length;
      resolvedWrap.hidden = resolved.length === 0;
      resolvedList.innerHTML = '';
      resolved.forEach(function (u) { resolvedList.appendChild(renderResolvedRow(u)); });
    }

    function renderStuckRow(u) {
      var r = document.createElement('div');
      r.className = 'stuck-row';

      var info = document.createElement('div');
      info.className = 'stuck-info';
      var email = document.createElement('div');
      email.className = 'stuck-email';
      email.textContent = u.email || '—';
      var meta = document.createElement('div');
      meta.className = 'stuck-meta';
      meta.textContent = 'registered ' + (u.createdAtIso ? u.createdAtIso.slice(0, 10) : '?')
        + (u.stripeSessionId ? '  ·  ' + u.stripeSessionId.slice(0, 18) + '…' : '');
      info.appendChild(email);
      info.appendChild(meta);
      r.appendChild(info);

      var btn = document.createElement('button');
      btn.className = 'stuck-btn';
      btn.textContent = '✓ Mark resolved';
      btn.addEventListener('click', function () { resolveStuck(u, r, btn); });
      r.appendChild(btn);

      return r;
    }

    function renderResolvedRow(u) {
      var r = document.createElement('div');
      r.className = 'resolved-row';

      var info = document.createElement('div');
      info.className = 'stuck-info';
      var email = document.createElement('div');
      email.className = 'stuck-email';
      email.textContent = u.email || '—';
      var meta = document.createElement('div');
      meta.className = 'stuck-meta';
      meta.textContent = 'resolved ' + (u.resolvedAtIso ? u.resolvedAtIso.slice(0, 10) : '?')
        + (u.createdAtIso ? '  ·  registered ' + u.createdAtIso.slice(0, 10) : '');
      info.appendChild(email);
      info.appendChild(meta);
      if (u.note) {
        var note = document.createElement('div');
        note.className = 'resolved-note';
        note.textContent = '“' + u.note + '”';
        info.appendChild(note);
      }
      r.appendChild(info);

      var btn = document.createElement('button');
      btn.className = 'resolved-btn';
      btn.textContent = 'Undo';
      btn.addEventListener('click', function () { unresolveStuck(u, btn); });
      r.appendChild(btn);

      return r;
    }

    async function resolveStuck(u, row, btn) {
      // Optional note — prompt is light enough for a one-person admin tool;
      // skip entirely if the user just wants the row gone.
      var note = prompt('Optional note (e.g. "refunded", "replied"). Leave blank to skip:', '');
      if (note === null) return; // cancel
      btn.disabled = true;
      btn.textContent = '…';
      try {
        var res = await fetch(PARTY + '/admin-resolve-stuck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: adminKey, userId: u.userId, note: note || '' })
        });
        var data = await res.json();
        if (!data.ok) {
          alert('Could not resolve: ' + (data.error || res.status));
          btn.disabled = false;
          btn.textContent = '✓ Mark resolved';
          return;
        }
        // Re-pull the audit so the row moves into the history section cleanly.
        await refreshAudit();
      } catch (e) {
        alert('Network error.');
        btn.disabled = false;
        btn.textContent = '✓ Mark resolved';
      }
    }

    async function unresolveStuck(u, btn) {
      if (!confirm('Move ' + (u.email || 'this row') + ' back to the active follow-up list?')) return;
      btn.disabled = true;
      btn.textContent = '…';
      try {
        var res = await fetch(PARTY + '/admin-unresolve-stuck', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: adminKey, userId: u.userId })
        });
        var data = await res.json();
        if (!data.ok) {
          alert('Could not unresolve: ' + (data.error || res.status));
          btn.disabled = false;
          btn.textContent = 'Undo';
          return;
        }
        await refreshAudit();
      } catch (e) {
        alert('Network error.');
        btn.disabled = false;
        btn.textContent = 'Undo';
      }
    }

    function fmtDate(ts) {
      if (!ts) return '?';
      try { return new Date(ts).toISOString().slice(0, 10); } catch (e) { return '?'; }
    }

    function renderDogs(dogs) {
      dogs.sort(function (a, b) { return (b.uploadedAt || 0) - (a.uploadedAt || 0); });
      dogCount.textContent = dogs.length;
      dogList.innerHTML = '';
      if (!dogs.length) {
        var empty = document.createElement('div');
        empty.className = 'muted';
        empty.textContent = 'No community dogs.';
        dogList.appendChild(empty);
        return;
      }
      dogs.forEach(function (dog) {
        var isSeed = (dog.id || '').indexOf('cdog_seed_') === 0;
        var row = document.createElement('div');
        row.className = 'dog';

        var img = document.createElement('img');
        img.className = 'dog-thumb';
        img.src = PARTY + '/community-image?id=' + encodeURIComponent(dog.id);
        img.alt = '';
        row.appendChild(img);

        var info = document.createElement('div');
        info.className = 'dog-info';
        var name = document.createElement('div');
        name.className = 'dog-name';
        name.textContent = dog.dogName || 'Unnamed';
        if (isSeed) {
          var tag = document.createElement('span');
          tag.className = 'seed-tag';
          tag.textContent = 'SEED';
          name.appendChild(tag);
        }
        var meta = document.createElement('div');
        meta.className = 'dog-meta';
        meta.textContent = (dog.breed || 'Mystery Breed') + '  ·  by '
          + (dog.username || 'Anonymous') + '  ·  ' + fmtDate(dog.uploadedAt);
        info.appendChild(name);
        info.appendChild(meta);
        row.appendChild(info);

        var del = document.createElement('button');
        del.className = 'dog-del';
        del.textContent = 'Delete';
        del.addEventListener('click', function () { deleteDog(dog, row, del); });
        row.appendChild(del);

        dogList.appendChild(row);
      });
    }

    async function deleteDog(dog, row, btn) {
      if (!confirm('Delete "' + (dog.dogName || 'this dog') + '" from the show? This is permanent.')) return;
      btn.disabled = true;
      btn.textContent = 'Deleting…';
      try {
        var res = await fetch(PARTY + '/admin-delete-dog?key=' + encodeURIComponent(adminKey)
          + '&id=' + encodeURIComponent(dog.id));
        var data = await res.json();
        if (data.ok) {
          row.remove();
          dogCount.textContent = (data.remainingCommunityDogs != null)
            ? data.remainingCommunityDogs
            : Math.max(0, parseInt(dogCount.textContent, 10) - 1);
        } else {
          btn.disabled = false;
          btn.textContent = 'Delete';
          alert('Could not delete: ' + (data.error || res.status));
        }
      } catch (e) {
        btn.disabled = false;
        btn.textContent = 'Delete';
        alert('Network error deleting dog.');
      }
    }

    async function loadDogs() {
      dogList.innerHTML = '<div class="muted">Loading…</div>';
      try {
        var res = await fetch(PARTY + '/all-dogs');
        var data = await res.json();
        allDogsCache = (data.dogs || []).slice();
        renderDogs(data.dogs || []);
        // Repopulate the manual-add picker — only aired dogs are eligible
        // (the email request only fires on first appearance, so the natural
        // flow assumes the dog has aired; this matches that mental model).
        var aired = allDogsCache.filter(function (d) { return d.firstAppearedAt; });
        aired.sort(function (a, b) { return (b.firstAppearedAt || 0) - (a.firstAppearedAt || 0); });
        addTestDog.innerHTML = '<option value="">— pick a dog —</option>';
        aired.forEach(function (d) {
          var opt = document.createElement('option');
          opt.value = d.id;
          opt.textContent = (d.dogName || 'Unnamed') + ' — ' + (d.username || 'Anonymous');
          addTestDog.appendChild(opt);
        });
      } catch (e) {
        dogList.innerHTML = '<div class="muted">Could not load dogs.</div>';
      }
    }

    function renderTestimonialCard(t, isPending) {
      var card = document.createElement('div');
      card.className = 'test-card';
      var meta = document.createElement('div');
      meta.className = 'test-meta';
      var when = t.receivedAt ? new Date(t.receivedAt).toISOString().slice(0, 16).replace('T', ' ') : '?';
      meta.innerHTML = '<strong>' + escapeHtml(t.username || 'a fan') + '</strong> &mdash; ' +
        escapeHtml(t.dogName || 'their dog') + '  ·  ' + when +
        (t.source ? '  ·  ' + t.source : '') +
        (isPending ? '' : '<span class="test-status-tag ' + t.status + '">' + t.status + '</span>');
      card.appendChild(meta);

      if (isPending) {
        var textarea = document.createElement('textarea');
        textarea.className = 'test-text-edit';
        textarea.value = t.text || '';
        textarea.maxLength = 500;
        card.appendChild(textarea);
      } else {
        var body = document.createElement('div');
        body.className = 'test-text';
        body.textContent = t.text || '';
        card.appendChild(body);
      }

      var actions = document.createElement('div');
      actions.className = 'test-actions';
      if (isPending) {
        var approveBtn = document.createElement('button');
        approveBtn.className = 'test-btn approve';
        approveBtn.textContent = 'Approve';
        approveBtn.addEventListener('click', function () {
          actBtn(approveBtn, t.id, 'approve', textarea.value, card);
        });
        var rejectBtn = document.createElement('button');
        rejectBtn.className = 'test-btn reject';
        rejectBtn.textContent = 'Reject';
        rejectBtn.addEventListener('click', function () {
          actBtn(rejectBtn, t.id, 'reject', null, card);
        });
        actions.appendChild(approveBtn);
        actions.appendChild(rejectBtn);
      } else {
        var deleteBtn = document.createElement('button');
        deleteBtn.className = 'test-btn delete';
        deleteBtn.textContent = 'Delete';
        deleteBtn.addEventListener('click', function () {
          if (!confirm('Delete this testimonial? Permanent.')) return;
          actBtn(deleteBtn, t.id, 'delete', null, card);
        });
        actions.appendChild(deleteBtn);
      }
      card.appendChild(actions);
      return card;
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function actBtn(btn, id, action, edited, card) {
      btn.disabled = true;
      var original = btn.textContent;
      btn.textContent = '…';
      try {
        var res = await fetch(PARTY + '/admin-testimonial-action', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: adminKey, id: id, action: action, edited: edited })
        });
        var data = await res.json();
        if (!data.ok) {
          alert('Action failed: ' + (data.error || res.status));
          btn.disabled = false;
          btn.textContent = original;
          return;
        }
        card.remove();
        loadTestimonials();
      } catch (e) {
        alert('Network error.');
        btn.disabled = false;
        btn.textContent = original;
      }
    }

    async function loadTestimonials() {
      pendingTestList.innerHTML = '<div class="muted">Loading…</div>';
      approvedTestList.innerHTML = '';
      try {
        var res = await fetch(PARTY + '/admin-testimonials?key=' + encodeURIComponent(adminKey));
        var data = await res.json();
        var pending = data.pending || [];
        var approved = data.approved || [];
        pendingCount.textContent = pending.length;
        approvedCount.textContent = approved.length;

        pendingTestList.innerHTML = '';
        if (!pending.length) {
          var empty = document.createElement('div');
          empty.className = 'muted';
          empty.textContent = 'No pending testimonials. They land here once owners reply to the appearance email.';
          pendingTestList.appendChild(empty);
        } else {
          pending.forEach(function (t) {
            pendingTestList.appendChild(renderTestimonialCard(t, true));
          });
        }

        if (!approved.length) {
          var emptyA = document.createElement('div');
          emptyA.className = 'muted';
          emptyA.textContent = 'No approved testimonials yet — landing rail will say "Reviews coming in".';
          approvedTestList.appendChild(emptyA);
        } else {
          approved.forEach(function (t) {
            approvedTestList.appendChild(renderTestimonialCard(t, false));
          });
        }
      } catch (e) {
        pendingTestList.innerHTML = '<div class="muted">Could not load testimonials.</div>';
      }
    }

    async function submitManualTestimonial() {
      var dogId = addTestDog.value;
      var text = addTestText.value.trim();
      if (!dogId) { addTestStatus.textContent = 'Pick a dog first.'; return; }
      if (!text) { addTestStatus.textContent = 'Add some text.'; return; }
      addTestBtn.disabled = true;
      addTestStatus.textContent = 'Adding…';
      try {
        var res = await fetch(PARTY + '/admin-add-testimonial', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: adminKey, dogId: dogId, text: text })
        });
        var data = await res.json();
        if (data.ok) {
          addTestText.value = '';
          addTestDog.value = '';
          addTestStatus.textContent = 'Added.';
          loadTestimonials();
        } else {
          addTestStatus.textContent = 'Failed: ' + (data.error || res.status);
        }
      } catch (e) {
        addTestStatus.textContent = 'Network error.';
      } finally {
        addTestBtn.disabled = false;
        setTimeout(function () { addTestStatus.textContent = ''; }, 4000);
      }
    }

    async function refreshAudit() {
      try {
        var res = await fetch(PARTY + '/admin-audit?key=' + encodeURIComponent(adminKey));
        if (res.ok) renderAudit(await res.json());
      } catch (e) {}
    }

    async function unlock() {
      var key = keyInput.value.trim();
      if (!key) return;
      loginErr.textContent = '';
      unlockBtn.disabled = true;
      unlockBtn.textContent = 'Checking…';
      try {
        var res = await fetch(PARTY + '/admin-audit?key=' + encodeURIComponent(key));
        if (res.status === 401) { loginErr.textContent = 'Wrong key.'; return; }
        if (!res.ok) { loginErr.textContent = 'Server error (' + res.status + ').'; return; }
        var audit = await res.json();
        adminKey = key;
        loginView.hidden = true;
        dashView.hidden = false;
        renderAudit(audit);
        loadDogs();
        loadTestimonials();
      } catch (e) {
        loginErr.textContent = 'Network error.';
      } finally {
        unlockBtn.disabled = false;
        unlockBtn.textContent = 'Unlock';
      }
    }

    unlockBtn.addEventListener('click', unlock);
    keyInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') unlock(); });
    reloadBtn.addEventListener('click', function () { refreshAudit(); loadDogs(); });
    reloadTestBtn.addEventListener('click', loadTestimonials);
    addTestBtn.addEventListener('click', submitManualTestimonial);
  </script>
</body>
</html>
